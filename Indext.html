<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bali Retreat & Purification Program</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px}
.full{background:red;color:white;padding:4px 8px;border-radius:6px}
.empty{background:green;color:white;padding:4px 8px;border-radius:6px}
.partial{background:orange;color:white;padding:4px 8px;border-radius:6px}
input,button{padding:10px;margin:5px;width:100%}
</style>
</head>
<body>

<h2>Bali Retreat & Purification Program</h2>

<input id="title" placeholder="Activity">
<input id="date" type="date">
<input id="guests" type="number" placeholder="Guests">
<input id="capacity" type="number" placeholder="Capacity">
<button onclick="add()">Save Booking</button>

<div id="list"></div>

<script>
const client = supabase.createClient(
"https://pagyrvsqlwekcgkhauph.supabase.co",
"sb_publishable_Z1tS7Vgnat2APkfnnUJiNQ_EZN6rHtV"
);

async function load(){
const {data}=await client.from("bookings").select("*").order("date");
let html="";
data.forEach(b=>{
let status="empty";
if(b.guests>=b.capacity) status="full";
else if(b.guests>0) status="partial";

html+=`
<div class="card">
<b>${b.title}</b><br>
${b.date}<br>
${b.guests}/${b.capacity}
<span class="${status}">
${status.toUpperCase()}
</span>
</div>`;
});
document.getElementById("list").innerHTML=html;
}

async function add(){
await client.from("bookings").insert({
title: title.value,
date: date.value,
guests: guests.value,
capacity: capacity.value
});
load();
}

load();
</script>

</body>
</html>
